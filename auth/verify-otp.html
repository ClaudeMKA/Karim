<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor - Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #050507;
  --bg-card: #131318;
  --bg-card-hover: #1a1a22;
  --bg-input: #16161e;
  --border-subtle: rgba(255,255,255,0.06);
  --border-input: rgba(255,255,255,0.1);
  --border-focus: rgba(212,175,85,0.5);
  --gold-primary: #d4af55;
  --gold-light: #e8cc7a;
  --gold-gradient: linear-gradient(135deg, #d4af55 0%, #f0d78c 50%, #d4af55 100%);
  --green-primary: #4ecca3;
  --text-primary: #f5f5f7;
  --text-secondary: #8e8e93;
  --text-tertiary: #555560;
  --radius-md: 14px;
  --radius-xl: 28px;
  --radius-full: 50px;
  --font-main: 'Inter', -apple-system, sans-serif;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-fast: all 0.15s ease;
}

*, *::before, *::after {
    margin:0; padding:0; box-sizing:border-box;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
*::-webkit-scrollbar {
    display: none;
}

body {
  font-family: var(--font-main);
  background: #0a0a0f;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

.phone-frame {
  width: 393px; height: 852px;
  background: linear-gradient(180deg, #080a14 0%, #0c1020 40%, #0a0a12 100%);
  border-radius: 55px; border: 3px solid #1c1c24;
  position: relative; overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 30px 80px rgba(0,0,0,0.7);
}

.phone-frame::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 20%, rgba(59,130,246,0.20) 0%, transparent 50%),
    radial-gradient(circle at 60% 70%, rgba(212,175,85,0.12) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  border-radius: 52px;
}

.dynamic-island {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  width: 126px; height: 36px; background: #000; border-radius: 20px; z-index: 50;
}

.home-indicator {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 134px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.2); z-index: 50;
}

.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 28px 0; height: 58px; font-size: 16px; font-weight: 600;
}

.status-icons { display: flex; align-items: center; gap: 5px; }
.status-icons svg { width: 18px; height: 18px; }

.screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  overflow-y: auto; scrollbar-width: none;
  position: relative; z-index: 1;
}

.screen::-webkit-scrollbar { display: none; }

.screen-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 22px 4px;
}

.btn-back {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-primary); transition: var(--transition-fast);
}

.btn-back:active { background: var(--bg-card-hover); transform: scale(0.93); }
.btn-back svg { width: 20px; height: 20px; }

.header-timer {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--gold-primary); font-weight: 600;
}

.header-timer svg { width: 16px; height: 16px; }

.screen-body {
  flex: 1; padding: 16px 24px 30px;
  display: flex; flex-direction: column; align-items: center;
}

/* Verification icon */
.verify-icon {
  width: 90px; height: 90px; border-radius: 28px;
  background: linear-gradient(145deg, rgba(212,175,85,0.1), rgba(212,175,85,0.03));
  border: 1px solid rgba(212,175,85,0.18);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 30px rgba(212,175,85,0.05);
  position: relative;
}

.verify-icon::after {
  content: '';
  position: absolute; inset: -15px; border-radius: 40px;
  background: radial-gradient(circle, rgba(212,175,85,0.06) 0%, transparent 70%);
}

.verify-icon svg { width: 40px; height: 40px; color: var(--gold-primary); position: relative; z-index: 2; }

.verify-title {
  font-size: 26px; font-weight: 700; margin-bottom: 8px; text-align: center;
}

.verify-desc {
  font-size: 15px; color: var(--text-secondary); line-height: 1.55;
  text-align: center; max-width: 320px; margin-bottom: 8px;
}

.verify-desc span { color: var(--gold-primary); font-weight: 600; }

.verify-email {
  font-size: 14px; color: var(--text-primary); font-weight: 600;
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  padding: 8px 18px; border-radius: var(--radius-full);
  margin-bottom: 36px;
  display: flex; align-items: center; gap: 8px;
}

.verify-email svg { width: 16px; height: 16px; color: var(--green-primary); }

/* OTP Input */
.otp-container {
  display: flex; gap: 12px; margin-bottom: 32px;
}

.otp-input {
  width: 54px; height: 64px;
  background: var(--bg-input);
  border: 2px solid var(--border-input);
  border-radius: 16px;
  font-family: var(--font-main);
  font-size: 26px; font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  outline: none;
  transition: var(--transition);
  caret-color: var(--gold-primary);
}

.otp-input:focus {
  border-color: rgba(59,130,246,0.4);
  background: rgba(59,130,246,0.04);
  box-shadow: 0 0 0 4px rgba(59,130,246,0.1), 0 0 20px rgba(59,130,246,0.06);
}

.otp-input.filled {
  border-color: rgba(59,130,246,0.4);
  background: rgba(59,130,246,0.04);
  box-shadow: 0 0 12px rgba(59,130,246,0.08);
}

.otp-input.error {
  border-color: #ef4444;
  background: rgba(239,68,68,0.04);
  animation: shakeInput 0.4s ease;
}

@keyframes shakeInput {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

/* Resend */
.resend-section {
  text-align: center; margin-bottom: 32px;
}

.resend-text {
  font-size: 14px; color: var(--text-tertiary); margin-bottom: 4px;
}

.resend-btn {
  background: none; border: none; font-family: var(--font-main);
  font-size: 14px; font-weight: 600; color: var(--gold-primary);
  cursor: pointer; transition: var(--transition-fast);
  padding: 4px 0;
}

.resend-btn:disabled {
  color: var(--text-tertiary); cursor: default;
}

.resend-btn:not(:disabled):active { color: var(--gold-light); }

.countdown {
  font-size: 13px; color: var(--gold-primary);
  font-weight: 600;
  text-shadow: 0 0 10px rgba(212,175,85,0.2);
}

/* Button */
.btn-primary {
  width: 100%; height: 56px; border-radius: var(--radius-full);
  border: none; font-family: var(--font-main); font-size: 16px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}

.btn-gold {
  background: var(--gold-gradient); color: #1a1200;
  box-shadow: 0 4px 24px rgba(212,175,85,0.25);
}

.btn-gold:hover { box-shadow: 0 6px 30px rgba(212,175,85,0.35); transform: translateY(-1px); }
.btn-gold:active { transform: scale(0.98); }

.btn-gold:disabled {
  opacity: 0.4; cursor: default; transform: none;
  box-shadow: none;
}

/* Info help */
.help-section {
  margin-top: auto; padding-top: 20px; text-align: center;
}

.help-link {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 13px; color: var(--text-tertiary);
  background: none; border: none; font-family: var(--font-main);
  cursor: pointer; padding: 10px; transition: var(--transition-fast);
}

.help-link svg { width: 16px; height: 16px; }
.help-link:hover { color: var(--text-secondary); }

/* Success overlay */
.success-overlay {
  position: absolute; inset: 0;
  background: rgba(5,5,7,0.88);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; visibility: hidden;
  transition: var(--transition); border-radius: 52px;
}

.success-overlay.visible {
  opacity: 1; visibility: visible;
  background: rgba(5,5,7,0.85);
}

.success-overlay.visible::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(78,204,163,0.08) 0%, transparent 60%);
  border-radius: 52px;
  pointer-events: none;
}

.success-card {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl); padding: 36px 28px;
  text-align: center; max-width: 320px; width: 85%;
  transform: scale(0.88) translateY(20px);
  transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 25px 80px rgba(0,0,0,0.6);
}

.success-overlay.visible .success-card { transform: scale(1) translateY(0); }

.success-icon {
  width: 66px; height: 66px; border-radius: 50%;
  background: linear-gradient(145deg, rgba(78,204,163,0.15), rgba(78,204,163,0.05));
  border: 2px solid rgba(78,204,163,0.25);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
  animation: pulseGreen 2s ease-in-out infinite;
}

@keyframes pulseGreen {
  0%, 100% { box-shadow: 0 0 0 0 rgba(78,204,163,0.2); }
  50% { box-shadow: 0 0 0 12px rgba(78,204,163,0); }
}

.success-icon svg { width: 30px; height: 30px; color: var(--green-primary); }

.success-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }

.success-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 24px;
}

.success-card .btn-gold { height: 50px; font-size: 15px; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.anim > * {
  opacity: 0; animation: fadeUp 0.5s ease-out forwards;
}
.anim > *:nth-child(1) { animation-delay: 0.06s; }
.anim > *:nth-child(2) { animation-delay: 0.12s; }
.anim > *:nth-child(3) { animation-delay: 0.18s; }
.anim > *:nth-child(4) { animation-delay: 0.24s; }
.anim > *:nth-child(5) { animation-delay: 0.30s; }
.anim > *:nth-child(6) { animation-delay: 0.36s; }
.anim > *:nth-child(7) { animation-delay: 0.42s; }
.anim > *:nth-child(8) { animation-delay: 0.48s; }

.maquette-label {
  text-align: center; margin-top: 24px; font-size: 13px;
  color: #555; font-family: var(--font-main);
}
.maquette-label strong { color: var(--gold-primary); }
</style>
</head>
<body>

<div>
<div class="phone-frame">
  <div class="dynamic-island"></div>
  <div class="home-indicator"></div>

  <div class="screen" style="opacity:1;visibility:visible;">
    <div class="status-bar">
      <span>23:45</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.24 4.24 0 00-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>

    <div class="screen-header">
      <button class="btn-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="header-timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span id="timerDisplay">04:59</span>
      </div>
    </div>

    <div class="screen-body anim">
      <div class="verify-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </div>

      <h2 class="verify-title">Verification</h2>
      <p class="verify-desc">Entrez le code a <span>6 chiffres</span> envoye a votre adresse email.</p>

      <div class="verify-email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>
        k***m@email.com
      </div>

      <div class="otp-container">
        <input type="text" class="otp-input" maxlength="1" id="otp1" inputmode="numeric" autofocus>
        <input type="text" class="otp-input" maxlength="1" id="otp2" inputmode="numeric">
        <input type="text" class="otp-input" maxlength="1" id="otp3" inputmode="numeric">
        <input type="text" class="otp-input" maxlength="1" id="otp4" inputmode="numeric">
        <input type="text" class="otp-input" maxlength="1" id="otp5" inputmode="numeric">
      </div>

      <div class="resend-section">
        <p class="resend-text">Vous n'avez pas recu le code ?</p>
        <button class="resend-btn" id="resendBtn" disabled>Renvoyer le code</button>
        <p class="countdown" id="countdown">Renvoyer dans 30s</p>
      </div>

      <button class="btn-primary btn-gold" id="verifyBtn" disabled onclick="handleVerify()">
        Verifier
      </button>

      <div class="help-section">
        <button class="help-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
          Besoin d'aide ?
        </button>
      </div>
    </div>
  </div>

  <!-- Success -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-card">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3 class="success-title">Email verifie !</h3>
      <p class="success-desc">Votre adresse email a ete confirmee avec succes. Vous pouvez maintenant acceder a Noor.</p>
      <button class="btn-primary btn-gold" onclick="window.location.href='../home/dashboard.html'">Continuer</button>
    </div>
  </div>

</div>
<p class="maquette-label"><strong>Noor</strong> &mdash; Maquette Verification OTP</p>
</div>

<script>
// OTP auto-focus logic
const inputs = document.querySelectorAll('.otp-input');
const verifyBtn = document.getElementById('verifyBtn');

inputs.forEach((input, i) => {
  input.addEventListener('input', (e) => {
    const val = e.target.value.replace(/[^0-9]/g, '');
    e.target.value = val;

    if (val && i < inputs.length - 1) {
      inputs[i + 1].focus();
    }

    e.target.classList.toggle('filled', !!val);
    e.target.classList.remove('error');
    checkComplete();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !input.value && i > 0) {
      inputs[i - 1].focus();
      inputs[i - 1].value = '';
      inputs[i - 1].classList.remove('filled');
      checkComplete();
    }
  });

  input.addEventListener('paste', (e) => {
    e.preventDefault();
    const data = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 5);
    data.split('').forEach((char, idx) => {
      if (inputs[idx]) {
        inputs[idx].value = char;
        inputs[idx].classList.add('filled');
      }
    });
    if (data.length > 0) inputs[Math.min(data.length, inputs.length - 1)].focus();
    checkComplete();
  });
});

function checkComplete() {
  const allFilled = [...inputs].every(inp => inp.value.length === 1);
  verifyBtn.disabled = !allFilled;
}

function handleVerify() {
  document.getElementById('successOverlay').classList.add('visible');
  setTimeout(function() {
    window.location.href = '../home/dashboard.html';
  }, 1500);
}

// Countdown
let seconds = 30;
const countdownEl = document.getElementById('countdown');
const resendBtn = document.getElementById('resendBtn');

const timer = setInterval(() => {
  seconds--;
  countdownEl.textContent = `Renvoyer dans ${seconds}s`;
  if (seconds <= 0) {
    clearInterval(timer);
    countdownEl.style.display = 'none';
    resendBtn.disabled = false;
  }
}, 1000);

// Page timer (5 min)
let totalSec = 299;
const timerDisplay = document.getElementById('timerDisplay');
setInterval(() => {
  if (totalSec > 0) {
    totalSec--;
    const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
    const s = (totalSec % 60).toString().padStart(2, '0');
    timerDisplay.textContent = `${m}:${s}`;
  }
}, 1000);
</script>
</body>
</html>
